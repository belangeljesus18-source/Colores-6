<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seleccionando colores</title>
</head>
<body>

    <script>
        var color;

        color = prompt(
            'Escoge color 1, color 2, color 3, color 4, color 5, color 6: ',
          
        );

        if (color == "1")
        {
            document.bgColor = '#20dfb1';
        }
        else if (color == "2")
        {
            document.bgColor = '#0055ff';
        }
        else if (color == "3")
        {
            document.bgColor = '#f22432';
        }
        else if (color == "4")
        {
            document.bgColor = '#00ff20';
        }
        else if (color == "5")
        {
            document.bgColor = '#a103fc';
        }
        else if (color == "6")
        {
            document.bgColor = '#f68a60';
        }
        else
        {
            document.write('Opción no válida');
        }

    </script>

</body>
</html>
